<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터활용능력 2급 필기 연습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card { height: 100%; display: flex; flex-direction: column; transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .selected-option { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; }
        
        .q-image { max-width: 100%; height: auto; border-radius: 12px; margin-bottom: 1rem; border: 1px solid #e2e8f0; display: block; }
        .opt-image { max-height: 120px; width: auto; border-radius: 6px; margin-top: 0.5rem; display: block; border: 1px solid #cbd5e1; background: white; }
        .option-content { display: flex; flex-direction: column; align-items: flex-start; gap: 0.4rem; }
        
        .session-btn { transition: all 0.2s; }
        .session-btn.active { background-color: #1e40af; color: white; border-color: #1e40af; transform: scale(1.05); }
        
        #admin-upload-zone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 관리자 비밀 업로드 창 (Ctrl+Alt+U) -->
    <div id="admin-upload-zone">
        <div class="bg-white p-10 rounded-3xl text-center max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-slate-800">관리자 모드</h2>
            <p class="text-slate-500 mb-6 text-sm text-pretty">새로운 엑셀 파일을 업로드하면 기존 문제는 모두 삭제되고 새로운 문제로 교체됩니다.</p>
            
            <div class="flex flex-col gap-3">
                <label for="file-upload" class="cursor-pointer bg-blue-600 text-white px-8 py-3 rounded-2xl hover:bg-blue-700 shadow-lg font-bold transition-all">
                    새 엑셀 파일 업로드
                </label>
                <input id="file-upload" type="file" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                
                <button onclick="clearData()" class="px-8 py-3 bg-rose-50 text-rose-600 rounded-2xl hover:bg-rose-100 font-semibold transition-all">
                    전체 데이터 초기화(삭제)
                </button>
                
                <button onclick="closeAdmin()" class="mt-2 text-slate-400 text-sm underline hover:text-slate-600">관리자 창 닫기</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-4 tracking-tight">컴퓨터활용능력 2급 퀴즈</h1>
            <div id="intro-section">
                <p id="status-msg" class="text-slate-500 mb-8 text-lg">아래에서 풀이할 회차를 선택해 주세요.</p>
                <!-- 회차 선택 영역 -->
                <div id="session-container" class="flex flex-wrap justify-center gap-3 mb-8"></div>
            </div>
        </header>

        <!-- 퀴즈 영역 (회차 선택 전까지 hidden) -->
        <div id="quiz-container" class="hidden">
            <div id="question-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

            <div class="flex flex-col md:flex-row justify-between items-center mt-12 py-8 border-t border-slate-200 gap-6">
                <button id="prev-btn" onclick="changePage(-1)" class="w-full md:w-auto px-8 py-3 bg-white border border-slate-300 text-slate-600 rounded-xl disabled:opacity-30 font-semibold">이전</button>
                <div class="flex flex-col items-center">
                    <span id="page-info" class="font-bold text-2xl text-slate-700">1 / 5</span>
                    <span id="session-info" class="text-sm text-blue-500 font-medium mt-1">1회차 진행 중</span>
                </div>
                <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                    <button id="next-btn" onclick="changePage(1)" class="w-full md:w-auto px-10 py-3 bg-blue-600 text-white rounded-xl font-semibold shadow-md hover:bg-blue-700">다음</button>
                    <button id="submit-btn" onclick="gradeQuiz()" class="hidden w-full md:w-auto px-12 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-bold shadow-md">채점하기</button>
                </div>
            </div>
        </div>

        <!-- 결과 영역 -->
        <div id="result-container" class="hidden text-center bg-white p-12 rounded-3xl shadow-2xl mt-8 max-w-2xl mx-auto border border-slate-100">
            <h2 class="text-7xl font-black text-slate-800" id="score-display">0점</h2>
            <p class="text-xl mt-6 text-slate-500 font-medium">수고하셨습니다! 결과를 확인해 보세요.</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-12">
                <button onclick="restartQuiz()" class="px-6 py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-700">이 회차 다시 풀기</button>
                <button onclick="showReviewPage()" class="px-6 py-4 bg-blue-100 text-blue-700 rounded-2xl font-bold hover:bg-blue-200">오답/해설 보기</button>
            </div>
            <button onclick="location.reload()" class="mt-6 text-slate-400 underline text-sm">다른 회차 선택하러 가기</button>
        </div>

        <!-- 오답 해설 영역 -->
        <div id="review-container" class="hidden">
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">오답 및 해설</h2>
                    <p class="text-slate-500 text-sm mt-1">틀린 문제를 복습하며 실력을 쌓으세요.</p>
                </div>
                <button onclick="location.reload()" class="px-6 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700">목록으로</button>
            </div>
            <div id="review-list" class="space-y-8"></div>
        </div>
    </div>

    <script>
        let allQuestionsRaw = [];
        let currentQuestions = [];
        let userAnswers = {};
        let currentPage = 0;
        let currentSessionNum = null;
        const questionsPerPage = 4;
        const questionsPerSession = 20;

        window.onload = function() {
            // 1. 저장된 데이터 확인
            const savedData = localStorage.getItem('quiz_data_v2');
            if (savedData) {
                allQuestionsRaw = JSON.parse(savedData);
                initSessions();
                document.getElementById('status-msg').innerText = "학습할 회차를 선택하면 문제가 나타납니다.";
            } else {
                document.getElementById('status-msg').innerHTML = "등록된 문제가 없습니다.<br><span class='text-sm text-slate-400 mt-2 block'>(관리자: Ctrl+Alt+U를 눌러 엑셀 업로드)</span>";
            }

            // 2. 단축키 리스너
            window.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'u') {
                    e.preventDefault();
                    document.getElementById('admin-upload-zone').style.display = 'flex';
                }
            });
        };

        function closeAdmin() { document.getElementById('admin-upload-zone').style.display = 'none'; }

        // 데이터 초기화
        function clearData() {
            if(confirm("정말로 모든 문제를 삭제하시겠습니까? 학생들도 문제를 볼 수 없게 됩니다.")) {
                localStorage.removeItem('quiz_data_v2');
                location.reload();
            }
        }

        // 엑셀 업로드 처리
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = e.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const sheetName = workbook.SheetNames[0];
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                    const processedData = json.map((row, index) => ({
                        id: row.번호 || index + 1,
                        q: row.질문 || "내용 없음",
                        detail: row.지문 || "",
                        image: row.그림 || "",
                        options: [String(row.보기1 || ""), String(row.보기2 || ""), String(row.보기3 || ""), String(row.보기4 || "")],
                        optionImages: [row.보기1그림 || "", row.보기2그림 || "", row.보기3그림 || "", row.보기4그림 || ""],
                        answer: parseInt(row.정답번호) - 1,
                        explanation: row.해설 || ""
                    }));

                    // 데이터 저장 (영구 유지)
                    localStorage.setItem('quiz_data_v2', JSON.stringify(processedData));
                    alert(`성공적으로 ${processedData.length}개의 문제를 등록했습니다!`);
                    location.reload(); 
                } catch (err) {
                    console.error(err);
                    alert("엑셀 파일 형식이 올바르지 않습니다.");
                }
            };
            reader.readAsBinaryString(file);
        }

        // 회차 버튼 생성
        function initSessions() {
            const container = document.getElementById('session-container');
            container.innerHTML = '';
            const totalSessions = Math.ceil(allQuestionsRaw.length / questionsPerSession);
            
            for (let i = 1; i <= totalSessions; i++) {
                const btn = document.createElement('button');
                btn.innerText = `${i}회차`;
                btn.className = `session-btn px-8 py-3 border-2 border-slate-200 rounded-2xl font-bold bg-white text-slate-600 hover:border-blue-400 hover:text-blue-600 shadow-sm`;
                btn.id = `session-btn-${i}`;
                btn.onclick = () => loadSession(i);
                container.appendChild(btn);
            }
        }

        // 특정 회차 로드
        function loadSession(sessionNum) {
            currentSessionNum = sessionNum;
            const start = (sessionNum - 1) * questionsPerSession;
            currentQuestions = allQuestionsRaw.slice(start, start + questionsPerSession);
            
            // UI 업데이트
            document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`session-btn-${sessionNum}`).classList.add('active');
            document.getElementById('session-info').innerText = `${sessionNum}회차 진행 중`;
            
            // 컨테이너 전환
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('review-container').classList.add('hidden');
            
            userAnswers = {}; 
            currentPage = 0;
            renderQuestions();
            
            // 회차 버튼 영역으로 스크롤 방지 및 퀴즈 시작점 이동
            document.getElementById('quiz-container').scrollIntoView({ behavior: 'smooth' });
        }

        function renderQuestions() {
            const list = document.getElementById('question-list');
            list.innerHTML = '';
            const pageItems = currentQuestions.slice(currentPage * questionsPerPage, (currentPage + 1) * questionsPerPage);

            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `card bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col`;
                
                const mainImgHtml = item.image ? `<img src="${item.image}" class="q-image" alt="문제 이미지" onerror="this.style.display='none'">` : '';
                
                let optionsHtml = item.options.map((opt, oIdx) => {
                    const isSelected = userAnswers[item.id] === oIdx;
                    const style = isSelected ? "selected-option scale-[1.02]" : "border border-slate-200 text-slate-600 hover:border-blue-300 hover:bg-blue-50";
                    const optImgUrl = item.optionImages ? item.optionImages[oIdx] : "";
                    const optImgHtml = optImgUrl ? `<img src="${optImgUrl}" class="opt-image" onerror="this.style.display='none'">` : '';

                    return `<button onclick="selectOption(${item.id}, ${oIdx})" class="w-full text-left p-4 rounded-2xl mb-3 transition-all ${style}">
                                <div class="option-content"><span class="font-medium">${oIdx + 1}. ${opt}</span>${optImgHtml}</div>
                            </button>`;
                }).join('');

                card.innerHTML = `
                    <div class="mb-3 flex justify-between items-center">
                        <span class="text-blue-600 font-black text-sm uppercase tracking-widest">Question ${item.id}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-4 text-slate-800 leading-snug">${item.q}</h3>
                    ${mainImgHtml}
                    ${item.detail ? `<div class="bg-slate-50 p-5 rounded-2xl text-sm mb-6 border border-slate-100 text-slate-600 leading-relaxed italic">${item.detail}</div>` : ''}
                    <div class="mt-auto">${optionsHtml}</div>`;
                list.appendChild(card);
            });
            updateNav();
        }

        function selectOption(id, idx) { userAnswers[id] = idx; renderQuestions(); }
        function changePage(dir) { currentPage += dir; window.scrollTo({ top: 0, behavior: 'smooth' }); renderQuestions(); }

        function updateNav() {
            const totalPages = Math.ceil(currentQuestions.length / questionsPerPage);
            document.getElementById('page-info').innerText = `${currentPage + 1} / ${totalPages || 1}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            const isLastPage = (currentPage === totalPages - 1) || (totalPages === 0);
            document.getElementById('next-btn').classList.toggle('hidden', isLastPage);
            document.getElementById('submit-btn').classList.toggle('hidden', !isLastPage);
        }

        function gradeQuiz() {
            let correctCount = 0;
            currentQuestions.forEach(q => { if (userAnswers[q.id] === q.answer) correctCount++; });
            const score = Math.round((correctCount / currentQuestions.length) * 100);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score}점`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartQuiz() {
            if (currentSessionNum) loadSession(currentSessionNum);
        }

        function showReviewPage() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('review-container').classList.remove('hidden');
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            
            currentQuestions.forEach(item => {
                const isCorrect = userAnswers[item.id] === item.answer;
                const div = document.createElement('div');
                div.className = `p-8 bg-white rounded-3xl border-2 ${isCorrect ? 'border-emerald-100 bg-emerald-50/30' : 'border-rose-100 bg-rose-50/30'} shadow-sm`;
                
                const mainImgHtml = item.image ? `<img src="${item.image}" class="q-image max-h-64 object-contain">` : '';
                
                let optionsReviewHtml = item.options.map((opt, oIdx) => {
                    const isCorrectOpt = oIdx === item.answer;
                    const isUserOpt = oIdx === userAnswers[item.id];
                    const optImgHtml = item.optionImages[oIdx] ? `<img src="${item.optionImages[oIdx]}" class="opt-image max-h-24">` : '';
                    
                    let statusClass = "bg-white border-slate-200 text-slate-500";
                    if(isCorrectOpt) statusClass = "bg-emerald-500 border-emerald-500 text-white font-bold ring-4 ring-emerald-100";
                    else if(isUserOpt) statusClass = "bg-rose-500 border-rose-500 text-white font-bold ring-4 ring-rose-100";

                    return `<div class="p-4 rounded-2xl mb-2 border-2 transition-all ${statusClass}">
                        <div class="flex justify-between items-center">
                            <span class="text-sm">${oIdx + 1}. ${opt}</span>
                            <span class="text-xs opacity-80 uppercase font-black">${isCorrectOpt ? '정답' : (isUserOpt ? '오답' : '')}</span>
                        </div>
                        ${optImgHtml}
                    </div>`;
                }).join('');

                div.innerHTML = `
                    <div class="flex items-center gap-2 mb-4">
                        <span class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} font-black text-2xl">${isCorrect ? '✓' : '✕'}</span>
                        <h4 class="text-lg font-bold text-slate-800">Q${item.id}. ${item.q}</h4>
                    </div>
                    ${mainImgHtml}
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">${optionsReviewHtml}</div>
                    <div class="p-6 bg-white/80 backdrop-blur rounded-2xl text-sm border border-slate-100 shadow-inner">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-1 h-4 bg-blue-500 rounded-full"></div>
                            <span class="text-blue-700 font-bold">정답 해설</span>
                        </div>
                        <div class="text-slate-600 leading-relaxed">${item.explanation || "해설이 등록되지 않았습니다."}</div>
                    </div>`;
                reviewList.appendChild(div);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

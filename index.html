<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터활용능력 2급 필기 연습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card { height: 100%; display: flex; flex-direction: column; transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .selected-option { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; }
        .correct-answer { border: 2px solid #10b981 !important; background-color: #f0fdf4; color: #166534; }
        .wrong-answer { border: 2px solid #ef4444 !important; background-color: #fef2f2; color: #991b1b; }
        .admin-only { display: none; }
        .session-btn { transition: all 0.2s; }
        .session-btn.active { background-color: #1e40af; color: white; border-color: #1e40af; transform: scale(1.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-6 text-center">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">컴퓨터활용능력 2급 퀴즈</h1>
            <p id="sub-title" class="text-slate-500 mb-6">학습할 회차를 선택하고 문제를 풀이하세요</p>
            
            <!-- 회차 선택 영역 -->
            <div id="session-container" class="flex flex-wrap justify-center gap-2 mb-8">
                <!-- 회차 버튼이 여기에 생성됨 -->
            </div>
            
            <!-- 관리자용 업로드 섹션 -->
            <div id="admin-upload-zone" class="admin-only mt-8 p-6 rounded-2xl border-2 border-dashed border-blue-300 bg-white max-w-xl mx-auto mb-10">
                <p class="text-sm font-bold text-blue-600 mb-3">[관리자 모드] 엑셀 파일을 업로드하여 전체 문제를 업데이트하세요</p>
                <div class="flex flex-col items-center gap-3">
                    <label for="file-upload" class="cursor-pointer bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 shadow-lg transition-all font-bold">
                        새로운 엑셀 파일 선택
                    </label>
                    <input id="file-upload" type="file" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                    <button onclick="downloadExcelTemplate()" class="text-xs text-slate-400 underline">기본 양식 다운로드</button>
                </div>
            </div>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-container" class="hidden">
            <div id="question-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Questions injected here -->
            </div>

            <!-- Navigation -->
            <div class="flex justify-between items-center mt-12 py-6 border-t border-slate-200">
                <button id="prev-btn" onclick="changePage(-1)" class="px-8 py-3 bg-white border border-slate-300 text-slate-600 rounded-xl hover:bg-slate-50 disabled:opacity-30 transition-all font-semibold">이전</button>
                <div class="flex flex-col items-center">
                    <span id="page-info" class="font-bold text-xl text-slate-700">1 / 5</span>
                    <span id="progress-text" class="text-xs text-slate-400 mt-1">로딩 중...</span>
                </div>
                <button id="next-btn" onclick="changePage(1)" class="px-8 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-md transition-all font-semibold">다음</button>
                <button id="submit-btn" onclick="gradeQuiz()" class="hidden px-10 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 shadow-lg font-bold transition-all">채점하기</button>
            </div>
        </div>

        <!-- Start Placeholder -->
        <div id="start-placeholder" class="text-center py-20 bg-white rounded-3xl shadow-sm border border-slate-100">
            <h3 class="text-xl font-bold text-slate-400">등록된 문제가 없습니다.</h3>
            <p class="text-slate-400 mt-1">관리자가 문제를 먼저 등록해야 합니다.</p>
        </div>

        <!-- Result Section -->
        <div id="result-container" class="hidden text-center bg-white p-12 rounded-3xl shadow-2xl mt-8 max-w-2xl mx-auto border border-emerald-100">
            <h2 class="text-5xl font-black text-slate-800" id="score-display">00점</h2>
            <p class="text-xl mt-4 text-slate-500" id="result-message"></p>
            <div class="flex flex-col sm:flex-row justify-center gap-4 mt-10">
                <button onclick="restartQuiz(false)" class="px-8 py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-700">전체 다시 풀기</button>
                <button id="review-wrong-btn" onclick="restartQuiz(true)" class="px-8 py-4 bg-rose-500 text-white rounded-2xl font-bold hover:bg-rose-600">오답 다시 풀기</button>
            </div>
        </div>
    </div>

    <script>
        let allQuestionsRaw = []; // 전체 엑셀 데이터
        let currentQuestions = []; // 현재 선택된 회차의 20문제
        let userAnswers = {};
        let currentPage = 0;
        let currentSession = 1;
        const questionsPerPage = 4;
        const questionsPerSession = 20;
        let isGraded = false;
        let wrongQuestions = [];

        window.onload = function() {
            const savedData = localStorage.getItem('quizData');
            if (savedData) {
                allQuestionsRaw = JSON.parse(savedData);
                initSessions();
                loadSession(1);
            }
        };

        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'U') {
                const zone = document.getElementById('admin-upload-zone');
                zone.style.display = zone.style.display === 'block' ? 'none' : 'block';
                alert("관리자 업로드 모드가 활성화되었습니다.");
            }
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = e.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    if(json.length === 0) throw new Error("엑셀에 데이터가 없습니다.");

                    allQuestionsRaw = json.map((row, index) => ({
                        id: row.번호 || index + 1,
                        q: row.질문 || "질문 없음",
                        detail: row.지문 || "",
                        options: [String(row.보기1 || ""), String(row.보기2 || ""), String(row.보기3 || ""), String(row.보기4 || "")],
                        answer: parseInt(row.정답번호 || 1) - 1,
                        explanation: row.해설 || ""
                    }));
                    
                    localStorage.setItem('quizData', JSON.stringify(allQuestionsRaw));
                    alert("전체 데이터가 성공적으로 저장되었습니다.");
                    initSessions();
                    loadSession(1);
                    document.getElementById('admin-upload-zone').style.display = 'none';
                } catch (err) {
                    alert("오류: " + err.message);
                }
            };
            reader.readAsBinaryString(file);
        }

        // 회차 버튼 초기화
        function initSessions() {
            const container = document.getElementById('session-container');
            container.innerHTML = '';
            const totalSessions = Math.ceil(allQuestionsRaw.length / questionsPerSession);
            
            for (let i = 1; i <= totalSessions; i++) {
                const btn = document.createElement('button');
                btn.innerText = `${i}회`;
                btn.className = `session-btn px-5 py-2 border border-slate-300 rounded-full font-bold text-slate-600 bg-white hover:bg-slate-50 shadow-sm`;
                btn.id = `session-btn-${i}`;
                btn.onclick = () => loadSession(i);
                container.appendChild(btn);
            }
        }

        // 특정 회차 로드
        function loadSession(sessionNum) {
            currentSession = sessionNum;
            const startIdx = (sessionNum - 1) * questionsPerSession;
            const endIdx = startIdx + questionsPerSession;
            currentQuestions = allQuestionsRaw.slice(startIdx, endIdx);
            
            // 버튼 활성화 스타일 업데이트
            document.querySelectorAll('.session-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`session-btn-${sessionNum}`);
            if (activeBtn) activeBtn.classList.add('active');

            document.getElementById('start-placeholder').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            
            restartQuiz(false);
        }

        function downloadExcelTemplate() {
            const data = [
                ["번호", "질문", "지문", "보기1", "보기2", "보기3", "보기4", "정답번호", "해설"],
                [1, "샘플 문제입니다.", "", "보기1", "보기2", "보기3", "보기4", 1, "해설입니다."]
            ];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Quiz");
            XLSX.writeFile(wb, "quiz_template.xlsx");
        }

        function renderQuestions() {
            const list = document.getElementById('question-list');
            list.innerHTML = '';
            const start = currentPage * questionsPerPage;
            const end = start + questionsPerPage;
            const pageItems = currentQuestions.slice(start, end);

            pageItems.forEach((item) => {
                const card = document.createElement('div');
                card.className = `card bg-white p-8 rounded-3xl shadow-sm border border-slate-100`;
                let optionsHtml = item.options.map((opt, oIdx) => {
                    let styleClass = "border border-slate-200 text-slate-600 hover:border-blue-300";
                    if (userAnswers[item.id] === oIdx) styleClass = "selected-option";
                    if (isGraded) {
                        if (oIdx === item.answer) styleClass = "correct-answer font-bold";
                        else if (userAnswers[item.id] === oIdx) styleClass = "wrong-answer";
                    }
                    return `<button onclick="selectOption(${item.id}, ${oIdx})" ${isGraded ? 'disabled' : ''} class="w-full text-left p-4 rounded-2xl mb-2 transition-all ${styleClass}">${oIdx + 1}. ${opt}</button>`;
                }).join('');

                card.innerHTML = `
                    <div class="mb-4 flex justify-between"><span class="text-blue-600 font-bold">Q${item.id}</span></div>
                    <h3 class="text-xl font-bold text-slate-800 mb-4">${item.q}</h3>
                    ${item.detail ? `<div class="bg-slate-50 p-4 rounded-xl text-sm mb-4 italic">${item.detail}</div>` : ''}
                    <div class="flex-grow">${optionsHtml}</div>
                    ${isGraded ? `<div class="mt-4 p-4 rounded-xl bg-slate-50 text-sm"><b>정답: ${item.answer + 1}번</b><br>${item.explanation}</div>` : ''}
                `;
                list.appendChild(card);
            });
            updateNav();
        }

        function selectOption(qId, optionIdx) { userAnswers[qId] = optionIdx; renderQuestions(); }
        function changePage(dir) { currentPage += dir; window.scrollTo({top:0, behavior:'smooth'}); renderQuestions(); }
        function updateNav() {
            const totalPages = Math.ceil(currentQuestions.length / questionsPerPage);
            document.getElementById('page-info').innerText = `${currentPage + 1} / ${totalPages || 1}`;
            document.getElementById('progress-text').innerText = `${currentQuestions.length}문항 중 ${Math.min((currentPage+1)*4, currentQuestions.length)}번까지 표시`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            const isLastPage = currentPage === totalPages - 1 || totalPages === 0;
            document.getElementById('next-btn').classList.toggle('hidden', isLastPage);
            document.getElementById('submit-btn').classList.toggle('hidden', !isLastPage || isGraded);
        }
        function gradeQuiz() {
            isGraded = true;
            let correctCount = 0; wrongQuestions = [];
            currentQuestions.forEach(q => { if (userAnswers[q.id] === q.answer) correctCount++; else wrongQuestions.push(q); });
            const score = Math.round((correctCount / currentQuestions.length) * 100);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score}점`;
            document.getElementById('result-message').innerText = `${currentQuestions.length}문제 중 ${correctCount}문제 정답입니다.`;
            document.getElementById('review-wrong-btn').style.display = wrongQuestions.length > 0 ? 'inline-block' : 'none';
        }
        function restartQuiz(onlyWrong = false) {
            if (!onlyWrong) {
                userAnswers = {};
            } else {
                currentQuestions = [...wrongQuestions];
                userAnswers = {};
            }
            currentPage = 0; isGraded = false;
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            renderQuestions();
        }
    </script>
</body>
</html>

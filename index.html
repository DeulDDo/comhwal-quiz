<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터활용능력 2급 필기 연습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card { height: 100%; display: flex; flex-direction: column; transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .selected-option { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; }
        .admin-only { display: none; }
        .session-btn { transition: all 0.2s; }
        .session-btn.active { background-color: #1e40af; color: white; border-color: #1e40af; transform: scale(1.05); }
        .q-image { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">컴퓨터활용능력 2급 퀴즈</h1>
            <p class="text-slate-500 mb-6">회차 선택 후 이름을 입력하여 제출하세요</p>
            
            <div id="session-container" class="flex flex-wrap justify-center gap-2 mb-8"></div>
            
            <div id="admin-upload-zone" class="admin-only mt-8 p-6 rounded-2xl border-2 border-dashed border-blue-300 bg-white max-w-xl mx-auto mb-10">
                <p class="text-sm font-bold text-blue-600 mb-3">[관리자 모드]</p>
                <div class="flex flex-col items-center gap-3">
                    <label for="file-upload" class="cursor-pointer bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 shadow-md font-bold">문제 엑셀 업로드</label>
                    <input id="file-upload" type="file" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                </div>
            </div>
        </header>

        <div id="quiz-container" class="hidden">
            <div id="question-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

            <div class="flex flex-col md:flex-row justify-between items-center mt-12 py-6 border-t border-slate-200 gap-4">
                <button id="prev-btn" onclick="changePage(-1)" class="w-full md:w-auto px-8 py-3 bg-white border border-slate-300 text-slate-600 rounded-xl disabled:opacity-30">이전</button>
                <div class="flex flex-col items-center">
                    <span id="page-info" class="font-bold text-xl text-slate-700">1 / 5</span>
                </div>
                <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                    <button id="next-btn" onclick="changePage(1)" class="w-full md:w-auto px-8 py-3 bg-blue-600 text-white rounded-xl">다음</button>
                    <div id="submit-area" class="hidden flex items-center gap-2">
                        <input type="text" id="user-name" oninput="toggleSubmitBtn()" placeholder="성함 입력" class="px-4 py-3 border border-slate-300 rounded-xl outline-none w-32 text-sm">
                        <button id="submit-btn" disabled onclick="gradeQuiz()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 disabled:bg-slate-300 font-bold">채점 및 제출</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-container" class="hidden text-center bg-white p-12 rounded-3xl shadow-2xl mt-8 max-w-2xl mx-auto">
            <h2 class="text-5xl font-black text-slate-800" id="score-display">0점</h2>
            <p class="text-xl mt-4 text-slate-500" id="result-message"></p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-10">
                <button onclick="restartQuiz(false)" class="px-6 py-4 bg-slate-800 text-white rounded-2xl font-bold">다시 풀기</button>
                <button onclick="showReviewPage()" class="px-6 py-4 bg-blue-100 text-blue-700 rounded-2xl font-bold">오답/해설 보기</button>
            </div>
        </div>

        <div id="review-container" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">해설 리스트</h2>
                <button onclick="restartQuiz(false)" class="px-5 py-2 bg-slate-800 text-white rounded-xl font-bold">닫기</button>
            </div>
            <div id="review-list" class="space-y-6"></div>
        </div>

        <div id="start-placeholder" class="text-center py-20 bg-white rounded-3xl border border-slate-100">
            <h3 class="text-xl font-bold text-slate-400 italic">문제를 선택하거나 엑셀을 업로드하세요.</h3>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "여기에_복사한_웹_앱_URL을_붙여넣으세요";

        let allQuestionsRaw = [];
        let currentQuestions = [];
        let userAnswers = {};
        let currentPage = 0;
        let currentSession = 1;
        const questionsPerPage = 4;
        const questionsPerSession = 20;
        let isGraded = false;
        let wrongQuestions = [];

        window.onload = function() {
            const savedData = localStorage.getItem('quizData');
            if (savedData) {
                allQuestionsRaw = JSON.parse(savedData);
                initSessions();
                loadSession(1);
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'U') {
                document.getElementById('admin-upload-zone').style.display = 'block';
            }
        });

        function toggleSubmitBtn() {
            const name = document.getElementById('user-name').value.trim();
            document.getElementById('submit-btn').disabled = name.length < 2;
        }

        async function gradeQuiz() {
            const name = document.getElementById('user-name').value.trim();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "제출 중...";

            isGraded = true;
            let correctCount = 0; 
            let correctIds = [];
            let wrongIds = [];
            wrongQuestions = [];

            currentQuestions.forEach(q => {
                if (userAnswers[q.id] === q.answer) {
                    correctCount++;
                    correctIds.push(q.id);
                } else {
                    wrongQuestions.push(q);
                    wrongIds.push(q.id);
                }
            });

            const score = Math.round((correctCount / currentQuestions.length) * 100);
            
            const recordData = {
                name: name,
                session: currentSession + '회',
                score: score,
                correctList: correctIds.join(','),
                wrongList: wrongIds.join(',')
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(recordData)
                });
            } catch (err) { console.error("전송 에러:", err); }

            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score}점`;
            document.getElementById('result-message').innerText = `${name}님, 제출이 완료되었습니다!`;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const workbook = XLSX.read(e.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                allQuestionsRaw = json.map((row, index) => ({
                    id: row.번호 || index + 1,
                    q: row.질문,
                    detail: row.지문 || "",
                    image: row.그림 || "", // '그림' 열 추가 대응
                    options: [String(row.보기1), String(row.보기2), String(row.보기3), String(row.보기4)],
                    answer: parseInt(row.정답번호) - 1,
                    explanation: row.해설 || ""
                }));
                localStorage.setItem('quizData', JSON.stringify(allQuestionsRaw));
                initSessions();
                loadSession(1);
                document.getElementById('admin-upload-zone').style.display = 'none';
            };
            reader.readAsBinaryString(file);
        }

        function initSessions() {
            const container = document.getElementById('session-container');
            container.innerHTML = '';
            const total = Math.ceil(allQuestionsRaw.length / questionsPerSession);
            for (let i = 1; i <= total; i++) {
                const btn = document.createElement('button');
                btn.innerText = `${i}회`;
                btn.className = `session-btn px-5 py-2 border rounded-full font-bold bg-white shadow-sm`;
                btn.id = `session-btn-${i}`;
                btn.onclick = () => loadSession(i);
                container.appendChild(btn);
            }
        }

        function loadSession(sessionNum) {
            currentSession = sessionNum;
            currentQuestions = allQuestionsRaw.slice((sessionNum - 1) * questionsPerSession, sessionNum * questionsPerSession);
            document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`session-btn-${sessionNum}`);
            if(activeBtn) activeBtn.classList.add('active');
            document.getElementById('start-placeholder').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            restartQuiz(false);
        }

        function renderQuestions() {
            const list = document.getElementById('question-list');
            list.innerHTML = '';
            const pageItems = currentQuestions.slice(currentPage * questionsPerPage, (currentPage + 1) * questionsPerPage);
            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `card bg-white p-8 rounded-3xl shadow-sm border border-slate-100`;
                
                // 이미지 태그 생성 (데이터가 있을 경우에만)
                const imgHtml = item.image ? `<img src="${item.image}" class="q-image" alt="문제 이미지" onerror="this.style.display='none'">` : '';
                
                let optionsHtml = item.options.map((opt, oIdx) => {
                    let style = userAnswers[item.id] === oIdx ? "selected-option" : "border border-slate-200 text-slate-600 hover:border-blue-300";
                    return `<button onclick="selectOption(${item.id}, ${oIdx})" class="w-full text-left p-4 rounded-2xl mb-2 transition-all ${style}">${oIdx + 1}. ${opt}</button>`;
                }).join('');

                card.innerHTML = `
                    <div class="mb-2 text-blue-600 font-bold">Q${item.id}</div>
                    <h3 class="text-xl font-bold mb-4">${item.q}</h3>
                    ${imgHtml}
                    ${item.detail ? `<div class="bg-slate-50 p-4 rounded-xl text-sm mb-4">${item.detail}</div>` : ''}
                    <div>${optionsHtml}</div>
                `;
                list.appendChild(card);
            });
            updateNav();
        }

        function selectOption(id, idx) { userAnswers[id] = idx; renderQuestions(); }
        function changePage(dir) { currentPage += dir; window.scrollTo({top:0}); renderQuestions(); }
        
        function updateNav() {
            const total = Math.ceil(currentQuestions.length / questionsPerPage);
            document.getElementById('page-info').innerText = `${currentPage + 1} / ${total || 1}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            const isLast = (currentPage === total - 1) || (total === 0);
            document.getElementById('next-btn').classList.toggle('hidden', isLast);
            document.getElementById('submit-area').classList.toggle('hidden', !isLast);
        }

        function restartQuiz(wrong) {
            if(!wrong) { userAnswers = {}; document.getElementById('user-name').value = ''; toggleSubmitBtn(); }
            else { currentQuestions = [...wrongQuestions]; userAnswers = {}; }
            currentPage = 0; isGraded = false;
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('review-container').classList.add('hidden');
            renderQuestions();
        }

        function showReviewPage() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('review-container').classList.remove('hidden');
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            currentQuestions.forEach(item => {
                const isCorrect = userAnswers[item.id] === item.answer;
                const div = document.createElement('div');
                div.className = `p-6 bg-white rounded-2xl border ${isCorrect ? 'border-emerald-100' : 'border-rose-100'} shadow-sm`;
                
                const imgHtml = item.image ? `<img src="${item.image}" class="q-image max-h-48" alt="문제 이미지">` : '';
                
                div.innerHTML = `
                    <h4 class="font-bold mb-2">Q${item.id}. ${item.q}</h4>
                    ${imgHtml}
                    <p class="text-sm ${isCorrect ? 'text-emerald-600' : 'text-rose-600'} mb-2">
                        정답: ${item.answer + 1}번 / 나의 선택: ${userAnswers[item.id] !== undefined ? userAnswers[item.id] + 1 : '미선택'}번
                    </p>
                    <div class="p-4 bg-slate-50 rounded-xl text-sm border-l-4 border-blue-500">
                        <b>해설:</b> ${item.explanation}
                    </div>
                `;
                reviewList.appendChild(div);
            });
            window.scrollTo({top:0});
        }
    </script>
</body>
</html>

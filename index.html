<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터활용능력 2급 필기 연습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        :root { font-size: 15.5px; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        #app { max-width: 1200px; margin: auto; padding: 1.2rem; width: 100%; }
        .card { transition: all 0.2s; border-radius: 14px; padding: 1.2rem !important; display: flex; flex-direction: column; min-height: 420px; }
        .selected-option { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; }
        .review-correct { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .review-wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        .q-image { max-height: 160px; width: auto; margin: 0.5rem auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        .opt-image { max-height: 55px; width: auto; border-radius: 4px; margin-top: 0.2rem; display: block; border: 1px solid #cbd5e1; background: white; }
        .session-btn { padding: 0.6rem 1.2rem !important; font-size: 1rem; border-radius: 12px !important; }
        #admin-upload-zone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        
        /* 이름 입력 모달 */
        #name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- 이름 입력 섹션 -->
    <div id="name-modal">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center mx-4">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">응시자 등록</h2>
            <p class="text-slate-500 mb-6">퀴즈를 시작하기 전 이름을 입력해 주세요.</p>
            <input type="text" id="user-name-input" placeholder="이름을 입력하세요" class="w-full p-4 border border-slate-200 rounded-2xl mb-4 text-center text-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="saveUserName()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all">시작하기</button>
        </div>
    </div>

    <div id="admin-upload-zone">
        <div class="bg-white p-6 rounded-2xl text-center max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-2">관리자 모드</h2>
            <div class="flex flex-col gap-2">
                <label for="file-upload" class="cursor-pointer bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 font-bold transition-all text-sm">엑셀 업로드</label>
                <input id="file-upload" type="file" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="clearData()" class="px-6 py-2 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 font-semibold text-sm">초기화</button>
                <button onclick="closeAdmin()" class="mt-2 text-slate-400 text-xs underline">닫기</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="mb-6 text-center">
            <div class="flex justify-between items-center mb-2 px-4">
                <span id="display-user-name" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">응시자: -</span>
                <button onclick="openAdminShortcut()" class="text-slate-300 hover:text-slate-500 text-xs">Admin</button>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">컴활 2급 퀴즈</h1>
            <div id="intro-section">
                <p id="status-msg" class="text-slate-500 mb-4 text-base">회차를 선택해 주세요.</p>
                <div id="session-container" class="flex flex-wrap justify-center gap-3 mb-4"></div>
            </div>
        </header>

        <div id="quiz-container" class="hidden">
            <div id="question-list" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            <div class="flex justify-between items-center mt-8 pt-6 border-t border-slate-200">
                <button id="prev-btn" onclick="changePage(-1)" class="px-5 py-2.5 bg-white border border-slate-300 text-slate-600 rounded-xl disabled:opacity-30 font-semibold shadow-sm hover:bg-slate-50 transition-all">이전</button>
                <div class="text-center">
                    <span id="page-info" class="font-bold text-xl text-slate-700 block leading-tight">1 / 5</span>
                    <span id="session-info" class="text-sm text-blue-500 font-bold">1회차</span>
                </div>
                <div class="flex gap-2">
                    <button id="next-btn" onclick="changePage(1)" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl font-semibold shadow-md hover:bg-blue-700 transition-all">다음</button>
                    <button id="submit-btn" onclick="gradeQuiz()" class="hidden px-10 py-2.5 bg-emerald-600 text-white rounded-xl font-bold shadow-md hover:bg-emerald-700 transition-all">채점 및 전송</button>
                </div>
            </div>
        </div>

        <div id="result-container" class="hidden text-center bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
            <div id="sending-indicator" class="hidden mb-4 text-blue-600 font-bold animate-pulse">결과를 서버로 전송 중입니다...</div>
            <h2 class="text-6xl font-black text-slate-800" id="score-display">0점</h2>
            <p class="text-base mt-4 text-slate-500 font-medium" id="result-text">테스트가 종료되었습니다.</p>
            <div class="flex flex-col sm:flex-row justify-center gap-3 mt-10">
                <button onclick="restartQuiz()" class="px-7 py-4 bg-slate-800 text-white rounded-2xl text-base font-bold shadow-lg hover:bg-slate-900 transition-all">다시 풀기</button>
                <button onclick="showReviewPage()" class="px-7 py-4 bg-blue-100 text-blue-700 rounded-2xl text-base font-bold hover:bg-blue-200 transition-all">오답 해설 보기</button>
            </div>
            <button onclick="location.reload()" class="mt-6 text-slate-400 underline text-sm">다른 회차 선택하기</button>
        </div>

        <div id="review-container" class="hidden">
            <div class="flex justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 sticky top-0 z-10">
                <h2 class="text-xl font-bold text-slate-800">오답 해설</h2>
                <button onclick="location.reload()" class="px-5 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold">목록으로</button>
            </div>
            <div id="review-list" class="grid grid-cols-1 md:grid-cols-2 gap-5 pb-12"></div>
        </div>
    </div>

    <script>
        /** * 구글 스프레드시트 배포 URL (이 부분을 실제 URL로 교체하세요)
         * 예: https://script.google.com/macros/s/.../exec
         */
        const WEB_APP_URL = "https://script.google.com/u/0/home/projects/1k1eqs_Znq1S7sENKFtDMiJ0_qhfgEg2oCXUhVPNERHr60IUUnQftmSm5/edit"; 

        let allQuestionsRaw = [];
        let currentQuestions = [];
        let userAnswers = {};
        let currentPage = 0;
        let currentSessionNum = null;
        let questionsPerPage = 4;
        let userName = "";
        const questionsPerSession = 20;

        function saveUserName() {
            const input = document.getElementById('user-name-input').value.trim();
            if (!input) {
                alert("이름을 입력해 주세요.");
                return;
            }
            userName = input;
            document.getElementById('name-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = `응시자: ${userName}`;
        }

        function updateQuestionsPerPage() {
            const isMobile = window.innerWidth < 768;
            questionsPerPage = isMobile ? 1 : 4;
            if (currentQuestions.length > 0) renderQuestions();
        }

        window.onload = function() {
            updateQuestionsPerPage();
            window.addEventListener('resize', updateQuestionsPerPage);
            const savedData = localStorage.getItem('quiz_data_v2');
            if (savedData) {
                allQuestionsRaw = JSON.parse(savedData);
                initSessions();
            } else {
                document.getElementById('status-msg').innerHTML = "등록된 문제가 없습니다. (관리자 모드에서 업로드)";
            }
            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'u') openAdminShortcut();
            });
        };

        function openAdminShortcut() { document.getElementById('admin-upload-zone').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-upload-zone').style.display = 'none'; }
        function clearData() { if(confirm("초기화하시겠습니까?")) { localStorage.removeItem('quiz_data_v2'); location.reload(); } }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(e.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    const processedData = json.map((row, index) => ({
                        id: row.번호 || index + 1,
                        q: row.질문 || "내용 없음",
                        detail: row.지문 || "",
                        image: row.그림 || "",
                        options: [String(row.보기1 || ""), String(row.보기2 || ""), String(row.보기3 || ""), String(row.보기4 || "")],
                        optionImages: [row.보기1그림 || "", row.보기2그림 || "", row.보기3그림 || "", row.보기4그림 || ""],
                        answer: parseInt(row.정답번호) - 1,
                        explanation: row.해설 || ""
                    }));
                    localStorage.setItem('quiz_data_v2', JSON.stringify(processedData));
                    alert("업로드 완료!");
                    location.reload(); 
                } catch (err) { alert("파일 처리 중 오류가 발생했습니다."); }
            };
            reader.readAsBinaryString(file);
        }

        function initSessions() {
            const container = document.getElementById('session-container');
            const totalSessions = Math.ceil(allQuestionsRaw.length / questionsPerSession);
            for (let i = 1; i <= totalSessions; i++) {
                const btn = document.createElement('button');
                btn.innerText = `${i}회차`;
                btn.className = `session-btn px-4 py-2 border border-slate-200 rounded-xl bg-white text-slate-600 hover:bg-blue-600 hover:text-white font-bold shadow-sm transition-all`;
                btn.onclick = () => loadSession(i);
                container.appendChild(btn);
            }
        }

        function loadSession(sessionNum) {
            currentSessionNum = sessionNum;
            currentQuestions = allQuestionsRaw.slice((sessionNum - 1) * questionsPerSession, sessionNum * questionsPerSession);
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('intro-section').classList.add('hidden');
            document.getElementById('session-info').innerText = `${sessionNum}회차`;
            userAnswers = {}; 
            currentPage = 0;
            renderQuestions();
        }

        function renderQuestions() {
            const list = document.getElementById('question-list');
            list.innerHTML = '';
            const startIdx = currentPage * questionsPerPage;
            const pageItems = currentQuestions.slice(startIdx, startIdx + questionsPerPage);
            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `card bg-white border border-slate-100 shadow-md hover:shadow-lg transition-shadow`;
                const mainImgHtml = item.image ? `<img src="${item.image}" class="q-image" onerror="this.style.display='none'">` : '';
                let optionsHtml = item.options.map((opt, oIdx) => {
                    const isSelected = userAnswers[item.id] === oIdx;
                    return `<button onclick="selectOption(${item.id}, ${oIdx})" class="w-full text-left p-2.5 px-4 rounded-xl mb-2 border transition-all ${isSelected ? 'selected-option' : 'border-slate-100 hover:bg-blue-50 text-sm'}">
                                <span class="font-bold mr-2 text-blue-500">${oIdx + 1}.</span>
                                <span class="font-medium">${opt}</span>
                            </button>`;
                }).join('');
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-blue-600 font-black text-sm uppercase tracking-widest">Question ${item.id}</span>
                    </div>
                    <h3 class="text-base font-bold mb-3 text-slate-800 leading-snug">${item.q}</h3>
                    ${mainImgHtml}
                    ${item.detail ? `<div class="bg-slate-50 p-3 rounded-xl text-xs mb-3 text-slate-600 border border-slate-200">${item.detail}</div>` : ''}
                    <div class="mt-auto space-y-1">${optionsHtml}</div>`;
                list.appendChild(card);
            });
            updateNav();
        }

        function selectOption(id, idx) { userAnswers[id] = idx; renderQuestions(); }
        function changePage(dir) { currentPage += dir; window.scrollTo({ top: 0, behavior: 'smooth' }); renderQuestions(); }

        function updateNav() {
            const totalPages = Math.ceil(currentQuestions.length / questionsPerPage);
            document.getElementById('page-info').innerText = `${currentPage + 1} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            const isLastPage = (currentPage >= totalPages - 1);
            document.getElementById('next-btn').classList.toggle('hidden', isLastPage);
            document.getElementById('submit-btn').classList.toggle('hidden', !isLastPage);
        }

        async function gradeQuiz() {
            let correct = 0;
            let total = currentQuestions.length;
            let detailLog = [];

            currentQuestions.forEach(q => {
                const isCorrect = userAnswers[q.id] === q.answer;
                if (isCorrect) correct++;
                detailLog.push(`Q${q.id}: ${isCorrect ? 'O' : 'X'}(선택:${(userAnswers[q.id]||-1)+1}/정답:${q.answer+1})`);
            });

            const score = Math.round((correct / total) * 100);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score}점`;
            document.getElementById('result-text').innerText = `${total}문제 중 ${correct}문제를 맞혔습니다.`;

            // 데이터 전송
            if (WEB_APP_URL) {
                sendToGoogleSheet(userName, score, correct, total - correct, detailLog.join(", "));
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function sendToGoogleSheet(name, score, correct, wrong, details) {
            const indicator = document.getElementById('sending-indicator');
            indicator.classList.remove('hidden');
            
            const now = new Date();
            const dateStr = now.toLocaleDateString();
            const timeStr = now.toLocaleTimeString();

            const formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('date', dateStr);
            formData.append('time', timeStr);
            formData.append('score', score);
            formData.append('correct', correct);
            formData.append('wrong', wrong);
            formData.append('details', details);
            formData.append('session', `${currentSessionNum}회차`);

            try {
                // 구글 앱스 스크립트로 POST 전송 (no-cors 모드 권장)
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                indicator.innerText = "데이터 전송 완료!";
                setTimeout(() => indicator.classList.add('hidden'), 3000);
            } catch (err) {
                indicator.innerText = "전송 실패. 네트워크를 확인하세요.";
                indicator.classList.remove('animate-pulse');
            }
        }

        function restartQuiz() { if (currentSessionNum) loadSession(currentSessionNum); }

        function showReviewPage() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('review-container').classList.remove('hidden');
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            currentQuestions.forEach(item => {
                const isCorrect = userAnswers[item.id] === item.answer;
                const card = document.createElement('div');
                card.className = `p-6 bg-white rounded-2xl border-2 shadow-sm ${isCorrect ? 'border-emerald-100 bg-emerald-50/10' : 'border-rose-100 bg-rose-50/10'}`;
                
                let optionsHtml = item.options.map((opt, oIdx) => {
                    let statusClass = "border-slate-100 bg-slate-50/50 text-slate-500";
                    if (item.answer === oIdx) statusClass = "review-correct font-bold";
                    else if (userAnswers[item.id] === oIdx) statusClass = "review-wrong font-bold";
                    return `<div class="w-full text-left p-2.5 px-4 rounded-xl mb-1.5 border text-sm ${statusClass}">${oIdx + 1}. ${opt}</div>`;
                }).join('');

                card.innerHTML = `
                    <div class="flex items-start gap-3 mb-3">
                        <span class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} font-black text-2xl">${isCorrect ? '✓' : '✕'}</span>
                        <h4 class="text-base font-bold text-slate-800 leading-tight">Q${item.id}. ${item.q}</h4>
                    </div>
                    <div class="mb-4">${optionsHtml}</div>
                    <div class="text-sm text-slate-700 p-4 bg-white rounded-xl border-2 ${isCorrect ? 'border-emerald-200' : 'border-rose-200'} leading-relaxed">
                        <span class="font-bold text-blue-700">정답 ${item.answer + 1}번</span> | ${item.explanation || "해설 없음"}
                    </div>`;
                reviewList.appendChild(card);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터활용능력 2급 필기 연습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        :root { font-size: 14px; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        #app { 
            max-width: 1000px; 
            margin: auto; 
            padding: 1rem;
            width: 100%;
        }

        .card { 
            transition: all 0.2s; 
            border-radius: 12px;
            padding: 1rem !important;
            display: flex;
            flex-direction: column;
        }
        
        .selected-option { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; }
        
        .q-image { max-height: 140px; width: auto; margin: 0.5rem auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        .opt-image { max-height: 50px; width: auto; border-radius: 4px; margin-top: 0.2rem; display: block; border: 1px solid #cbd5e1; background: white; }
        
        .session-btn { padding: 0.5rem 1rem !important; font-size: 0.9rem; border-radius: 10px !important; }
        
        #admin-upload-zone { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        
        /* 텍스트 줄임 방지 */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="admin-upload-zone">
        <div class="bg-white p-6 rounded-2xl text-center max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-2">관리자 모드</h2>
            <p class="text-slate-500 mb-4 text-xs">엑셀 업로드 시 기존 데이터는 교체됩니다.</p>
            <div class="flex flex-col gap-2">
                <label for="file-upload" class="cursor-pointer bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 font-bold transition-all text-sm">엑셀 업로드</label>
                <input id="file-upload" type="file" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="clearData()" class="px-6 py-2 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 font-semibold text-sm">초기화</button>
                <button onclick="closeAdmin()" class="mt-2 text-slate-400 text-xs underline">닫기</button>
            </div>
        </div>
    </div>

    <div id="app">
        <header class="mb-4 text-center">
            <h1 class="text-2xl font-extrabold text-slate-800 mb-2">컴활 2급 퀴즈</h1>
            <div id="intro-section">
                <p id="status-msg" class="text-slate-500 mb-4 text-sm">회차를 선택해 주세요.</p>
                <div id="session-container" class="flex flex-wrap justify-center gap-2 mb-4"></div>
            </div>
        </header>

        <div id="quiz-container" class="hidden">
            <!-- 반응형 그리드: 모바일 1열, 태블릿 이상 2열 -->
            <div id="question-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-200">
                <button id="prev-btn" onclick="changePage(-1)" class="px-4 py-2 bg-white border border-slate-300 text-slate-600 rounded-lg disabled:opacity-30 text-sm font-semibold">이전</button>
                <div class="text-center">
                    <span id="page-info" class="font-bold text-lg text-slate-700 block leading-tight">1 / 10</span>
                    <span id="session-info" class="text-xs text-blue-500 font-medium">1회차</span>
                </div>
                <div class="flex gap-2">
                    <button id="next-btn" onclick="changePage(1)" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold text-sm shadow-sm">다음</button>
                    <button id="submit-btn" onclick="gradeQuiz()" class="hidden px-8 py-2 bg-emerald-600 text-white rounded-lg font-bold text-sm shadow-sm">채점</button>
                </div>
            </div>
        </div>

        <div id="result-container" class="hidden text-center bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <h2 class="text-5xl font-black text-slate-800" id="score-display">0점</h2>
            <p class="text-sm mt-4 text-slate-500">테스트가 종료되었습니다.</p>
            <div class="flex flex-col sm:flex-row justify-center gap-2 mt-8">
                <button onclick="restartQuiz()" class="px-5 py-3 bg-slate-800 text-white rounded-xl text-sm font-bold">다시 풀기</button>
                <button onclick="showReviewPage()" class="px-5 py-3 bg-blue-100 text-blue-700 rounded-xl text-sm font-bold">오답 보기</button>
            </div>
            <button onclick="location.reload()" class="mt-4 text-slate-400 underline text-xs">다른 회차 선택</button>
        </div>

        <div id="review-container" class="hidden">
            <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold">오답 해설</h2>
                <button onclick="location.reload()" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-xs font-bold">목록</button>
            </div>
            <div id="review-list" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <script>
        let allQuestionsRaw = [];
        let currentQuestions = [];
        let userAnswers = {};
        let currentPage = 0;
        let currentSessionNum = null;
        let questionsPerPage = 2; // 기본값
        const questionsPerSession = 20;

        // 화면 크기에 따라 페이지당 문제 수 결정
        function updateQuestionsPerPage() {
            const isMobile = window.innerWidth < 768; // Tailwind md 기준
            const oldVal = questionsPerPage;
            questionsPerPage = isMobile ? 1 : 2;
            
            // 값이 바뀌었을 때 현재 페이지를 조정하여 보던 위치 유지 시도
            if (oldVal !== questionsPerPage && currentQuestions.length > 0) {
                renderQuestions();
            }
        }

        window.onload = function() {
            updateQuestionsPerPage();
            window.addEventListener('resize', updateQuestionsPerPage);

            const savedData = localStorage.getItem('quiz_data_v2');
            if (savedData) {
                allQuestionsRaw = JSON.parse(savedData);
                initSessions();
            } else {
                document.getElementById('status-msg').innerHTML = "등록된 문제가 없습니다. (Ctrl+Alt+U)";
            }

            window.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'u') {
                    e.preventDefault();
                    document.getElementById('admin-upload-zone').style.display = 'flex';
                }
            });
        };

        function closeAdmin() { document.getElementById('admin-upload-zone').style.display = 'none'; }

        function clearData() {
            if(confirm("문제를 삭제하시겠습니까?")) {
                localStorage.removeItem('quiz_data_v2');
                location.reload();
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(e.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    const processedData = json.map((row, index) => ({
                        id: row.번호 || index + 1,
                        q: row.질문 || "내용 없음",
                        detail: row.지문 || "",
                        image: row.그림 || "",
                        options: [String(row.보기1 || ""), String(row.보기2 || ""), String(row.보기3 || ""), String(row.보기4 || "")],
                        optionImages: [row.보기1그림 || "", row.보기2그림 || "", row.보기3그림 || "", row.보기4그림 || ""],
                        answer: parseInt(row.정답번호) - 1,
                        explanation: row.해설 || ""
                    }));
                    localStorage.setItem('quiz_data_v2', JSON.stringify(processedData));
                    alert("업로드 완료!");
                    location.reload(); 
                } catch (err) {
                    alert("파일 오류");
                }
            };
            reader.readAsBinaryString(file);
        }

        function initSessions() {
            const container = document.getElementById('session-container');
            const totalSessions = Math.ceil(allQuestionsRaw.length / questionsPerSession);
            for (let i = 1; i <= totalSessions; i++) {
                const btn = document.createElement('button');
                btn.innerText = `${i}회`;
                btn.className = `session-btn px-4 py-2 border border-slate-200 rounded-xl bg-white text-slate-600 hover:bg-blue-50 hover:text-blue-600 font-bold shadow-sm`;
                btn.onclick = () => loadSession(i);
                container.appendChild(btn);
            }
        }

        function loadSession(sessionNum) {
            currentSessionNum = sessionNum;
            currentQuestions = allQuestionsRaw.slice((sessionNum - 1) * questionsPerSession, sessionNum * questionsPerSession);
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('intro-section').classList.add('hidden');
            document.getElementById('session-info').innerText = `${sessionNum}회차`;
            userAnswers = {}; 
            currentPage = 0;
            renderQuestions();
        }

        function renderQuestions() {
            if (!currentQuestions.length) return;
            const list = document.getElementById('question-list');
            list.innerHTML = '';
            
            const startIdx = currentPage * questionsPerPage;
            const pageItems = currentQuestions.slice(startIdx, startIdx + questionsPerPage);

            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `card bg-white border border-slate-100 shadow-sm`;
                
                const mainImgHtml = item.image ? `<img src="${item.image}" class="q-image" onerror="this.style.display='none'">` : '';
                let optionsHtml = item.options.map((opt, oIdx) => {
                    const isSelected = userAnswers[item.id] === oIdx;
                    const optImgHtml = item.optionImages[oIdx] ? `<img src="${item.optionImages[oIdx]}" class="opt-image" onerror="this.style.display='none'">` : '';
                    return `<button onclick="selectOption(${item.id}, ${oIdx})" class="w-full text-left p-2 px-3 rounded-lg mb-1 border transition-colors ${isSelected ? 'selected-option' : 'border-slate-100 hover:bg-blue-50 text-sm'}">
                                <span class="font-medium">${oIdx + 1}. ${opt}</span>${optImgHtml}
                            </button>`;
                }).join('');

                card.innerHTML = `
                    <div class="flex items-center gap-2 mb-1"><span class="text-blue-500 font-bold text-xs uppercase tracking-tight">Question ${item.id}</span></div>
                    <h3 class="text-sm font-bold mb-2 text-slate-800 leading-tight">${item.q}</h3>
                    ${mainImgHtml}
                    ${item.detail ? `<div class="bg-slate-50 p-2 rounded-lg text-xs mb-2 text-slate-500 border border-slate-100">${item.detail}</div>` : ''}
                    <div class="mt-auto">${optionsHtml}</div>`;
                list.appendChild(card);
            });
            updateNav();
        }

        function selectOption(id, idx) { userAnswers[id] = idx; renderQuestions(); }
        function changePage(dir) { currentPage += dir; window.scrollTo({ top: 0, behavior: 'smooth' }); renderQuestions(); }

        function updateNav() {
            const totalPages = Math.ceil(currentQuestions.length / questionsPerPage);
            document.getElementById('page-info').innerText = `${currentPage + 1} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            const isLastPage = (currentPage >= totalPages - 1);
            document.getElementById('next-btn').classList.toggle('hidden', isLastPage);
            document.getElementById('submit-btn').classList.toggle('hidden', !isLastPage);
        }

        function gradeQuiz() {
            let correct = 0;
            currentQuestions.forEach(q => { if (userAnswers[q.id] === q.answer) correct++; });
            const score = Math.round((correct / currentQuestions.length) * 100);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score}점`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartQuiz() { if (currentSessionNum) loadSession(currentSessionNum); }

        function showReviewPage() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('review-container').classList.remove('hidden');
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            currentQuestions.forEach(item => {
                const isCorrect = userAnswers[item.id] === item.answer;
                const div = document.createElement('div');
                div.className = `p-4 bg-white rounded-xl border-2 ${isCorrect ? 'border-emerald-100 bg-emerald-50/20' : 'border-rose-100 bg-rose-50/20'}`;
                div.innerHTML = `
                    <div class="flex items-start gap-2 mb-2">
                        <span class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} font-bold text-lg">${isCorrect ? '✓' : '✕'}</span>
                        <h4 class="text-sm font-bold">Q${item.id}. ${item.q}</h4>
                    </div>
                    <div class="flex gap-4 items-center">
                        <p class="text-xs text-blue-700 font-bold bg-blue-50 px-2 py-1 rounded">정답: ${item.answer + 1}번</p>
                        ${userAnswers[item.id] !== undefined ? `<p class="text-xs text-slate-500">내 선택: ${userAnswers[item.id] + 1}번</p>` : ''}
                    </div>
                    <p class="text-xs text-slate-600 mt-2 p-2 bg-white/50 rounded border border-slate-100">${item.explanation || "등록된 해설이 없습니다."}</p>`;
                reviewList.appendChild(div);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
